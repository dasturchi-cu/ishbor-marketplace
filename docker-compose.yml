services:
  postgres:
    image: postgres:16-alpine
    container_name: ishbor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ishbor
      POSTGRES_PASSWORD: ishbor
      POSTGRES_DB: ishbor
    ports:
      - "5432:5432"
    volumes:
      - ishbor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ishbor -d ishbor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ishbor_pg_data:
